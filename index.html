<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Auto Mockup Tool</title>

<script src="https://cdnjs.cloudflare.com/ajax/libs/fabric.js/5.2.4/fabric.min.js"></script>

<style>
body {
  background: #111;
  color: white;
  font-family: sans-serif;
}

.canvas-wrap {
  display: flex;
  gap: 20px;
  padding: 20px;
}

canvas {
  background: white;
  border-radius: 10px;
}

.tshirt-list {
  display: flex;
  gap: 10px;
  flex-wrap: wrap;
  padding: 10px;
}

.thumb {
  background: #222;
  padding: 5px;
  border-radius: 8px;
  cursor: pointer;
  text-align: center;
}

.thumb img {
  width: 60px;
}

</style>
</head>

<body>

<h2 style="padding:10px;">🔥 Auto Mockup Tool (Front + Back)</h2>

<input type="file" multiple onchange="addTshirts(this.files)">
<input type="file" onchange="loadDesign(this.files[0])">
<input type="file" onchange="loadDesignBack(this.files[0])">

<div class="tshirt-list" id="list"></div>

<div class="canvas-wrap">

  <!-- FRONT -->
  <div>
    <h3>Front</h3>
    <canvas id="front" width="400" height="500"></canvas>
  </div>

  <!-- BACK -->
  <div>
    <h3>Back</h3>
    <canvas id="back" width="400" height="500"></canvas>
  </div>

</div>

<script>
const frontCanvas = new fabric.Canvas('front');
const backCanvas = new fabric.Canvas('back');

let tshirts = [];
let names = [];
let active = 0;

let designFront = null;
let designBack = null;

let tshirtFront = null;
let tshirtBack = null;

function addTshirts(files){
  Array.from(files).forEach(file=>{
    const r = new FileReader();
    r.onload = e=>{
      tshirts.push(e.target.result);
      names.push(file.name);
      renderList();
      if(tshirts.length === 1){
        loadTshirt(0);
      }
    }
    r.readAsDataURL(file);
  })
}

function renderList(){
  const list = document.getElementById("list");
  list.innerHTML = "";

  tshirts.forEach((src,i)=>{
    const div = document.createElement("div");
    div.className = "thumb";

    const img = document.createElement("img");
    img.src = src;

    const name = document.createElement("div");
    name.textContent = names[i];

    // DOUBLE CLICK RENAME
    name.ondblclick = ()=>{
      const n = prompt("Rename:", names[i]);
      if(n){
        names[i] = n;
        renderList();
      }
    }

    div.onclick = ()=>loadTshirt(i);

    div.appendChild(img);
    div.appendChild(name);

    list.appendChild(div);
  })
}

function loadTshirt(i){
  active = i;

  frontCanvas.clear();
  backCanvas.clear();

  fabric.Image.fromURL(tshirts[i], img=>{
    img.scaleToWidth(400);
    tshirtFront = img;
    frontCanvas.add(img);
  })

  fabric.Image.fromURL(tshirts[i], img=>{
    img.scaleToWidth(400);
    tshirtBack = img;
    backCanvas.add(img);
  })

  alert("✅ Auto Saved!");
}

function loadDesign(file){
  const r = new FileReader();
  r.onload = e=>{
    if(designFront) frontCanvas.remove(designFront);

    fabric.Image.fromURL(e.target.result, img=>{
      img.scaleToWidth(150);
      img.set({left:120, top:150});
      designFront = img;
      frontCanvas.add(img);
    })
  }
  r.readAsDataURL(file);
}

function loadDesignBack(file){
  const r = new FileReader();
  r.onload = e=>{
    if(designBack) backCanvas.remove(designBack);

    fabric.Image.fromURL(e.target.result, img=>{
      img.scaleToWidth(150);
      img.set({left:120, top:150});
      designBack = img;
      backCanvas.add(img);
    })
  }
  r.readAsDataURL(file);
}
</script>

</body>
</html>
