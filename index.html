<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Auto Mockup Tool</title>

<script src="https://cdnjs.cloudflare.com/ajax/libs/fabric.js/5.2.4/fabric.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js"></script>

<style>
body { font-family: Arial; text-align: center; }
canvas { border:1px solid #ccc; margin:10px; }
.box { display:inline-block; margin:10px; }
img { border:1px solid #ccc; margin-top:5px; }
</style>
</head>
<body>

<h2>Auto Mockup Generator</h2>

<p><b>1. Upload T-shirt Images (Multiple)</b></p>
<input type="file" id="tshirts" multiple accept="image/*"><br><br>

<p><b>2. Upload Design</b></p>
<input type="file" id="design" accept="image/*"><br><br>

<button onclick="loadPreview()">Preview + Drag</button>
<button onclick="generate()">Generate Mockups</button>

<br><br>
<button onclick="downloadSelected()">Download Selected</button>
<button onclick="downloadZIP()">Download ZIP</button>

<h3>Preview</h3>
<canvas id="previewCanvas" width="400" height="500"></canvas>

<h3>Output</h3>
<div id="output"></div>

<script>
const canvas = new fabric.Canvas('previewCanvas');
let designObj = null;
let tshirtFiles = [];
let generatedImages = [];

// Preview
function loadPreview(){
  tshirtFiles = document.getElementById("tshirts").files;
  const designFile = document.getElementById("design").files[0];

  if (!tshirtFiles.length || !designFile) {
    alert("Upload both first!");
    return;
  }

  const reader = new FileReader();
  reader.onload = function(e){
    fabric.Image.fromURL(e.target.result, function(img){
      img.scaleToWidth(400);
      canvas.setBackgroundImage(img, canvas.renderAll.bind(canvas));
    });
  };
  reader.readAsDataURL(tshirtFiles[0]);

  const designReader = new FileReader();
  designReader.onload = function(e){
    fabric.Image.fromURL(e.target.result, function(img){

      if (designObj) canvas.remove(designObj);

      img.set({
        left: 150,
        top: 200,
        scaleX: 0.4,
        scaleY: 0.4
      });

      designObj = img;
      canvas.add(img);
      canvas.setActiveObject(img);
      canvas.renderAll();
    });
  };
  designReader.readAsDataURL(designFile);
}

// Generate
function generate(){
  if (!designObj || !tshirtFiles.length) {
    alert("Preview first!");
    return;
  }

  document.getElementById("output").innerHTML = "";
  generatedImages = [];

  const pos = {
    left: designObj.left,
    top: designObj.top,
    width: designObj.getScaledWidth(),
    height: designObj.getScaledHeight()
  };

  const designURL = designObj.toDataURL({
    format: "png",
    quality: 1
  });

  let index = 0;

  for (let file of tshirtFiles) {
    const reader = new FileReader();

    reader.onload = function(ev){
      const tshirtImg = new Image();
      tshirtImg.src = ev.target.result;

      tshirtImg.onload = function(){
        const canvasOut = document.createElement("canvas");
        canvasOut.width = 400;
        canvasOut.height = 500;
        const ctx = canvasOut.getContext("2d");

        ctx.drawImage(tshirtImg, 0, 0, 400, 500);

        const design = new Image();
        design.src = designURL;

        design.onload = function(){
          ctx.drawImage(design, pos.left, pos.top, pos.width, pos.height);

          // ✅ HD export fix
          const dataURL = canvasOut.toDataURL("image/png", 1.0);
          generatedImages.push(dataURL);

          const currentIndex = index; // ✅ index fix

          // UI box
          const box = document.createElement("div");
          box.className = "box";

          const checkbox = document.createElement("input");
          checkbox.type = "checkbox";
          checkbox.value = generatedImages.length - 1;

          const img = document.createElement("img");
          img.src = dataURL;
          img.width = 150;

          const btn = document.createElement("button");
          btn.innerText = "Download";
          btn.onclick = () => downloadImage(dataURL, "mockup_" + currentIndex + ".png");

          box.appendChild(checkbox);
          box.appendChild(document.createElement("br"));
          box.appendChild(img);
          box.appendChild(document.createElement("br"));
          box.appendChild(btn);

          document.getElementById("output").appendChild(box);

          index++;
        };
      };
    };

    reader.readAsDataURL(file);
  }
}

// Download fix (stable)
function downloadImage(data, filename){
  const a = document.createElement("a");
  a.href = data;
  a.download = filename;

  document.body.appendChild(a);
  a.click();
  document.body.removeChild(a);
}

// Download selected
function downloadSelected(){
  const selected = document.querySelectorAll("#output input:checked");

  if (!selected.length) {
    alert("Select at least one!");
    return;
  }

  selected.forEach((cb, i) => {
    const index = cb.value;
    downloadImage(generatedImages[index], "selected_" + i + ".png");
  });
}

// ZIP download (stable)
function downloadZIP(){
  const selected = document.querySelectorAll("#output input:checked");

  if (!selected.length) {
    alert("Select at least one!");
    return;
  }

  const zip = new JSZip();

  selected.forEach((cb, i) => {
    const index = cb.value;
    const base64 = generatedImages[index].split(",")[1];
    zip.file("mockup_" + i + ".png", base64, {base64:true});
  });

  zip.generateAsync({type:"blob"}).then(function(content){
    const link = document.createElement("a");
    const url = URL.createObjectURL(content);

    link.href = url;
    link.download = "mockups.zip";

    document.body.appendChild(link);
    link.click();

    setTimeout(() => {
      document.body.removeChild(link);
      URL.revokeObjectURL(url);
    }, 100);
  });
}
</script>

</body>
</html>
