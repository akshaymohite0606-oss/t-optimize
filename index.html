<script>
const canvas = new fabric.Canvas('previewCanvas');
let designObj = null;
let tshirtFiles = [];
let generatedImages = [];
let timeout;
let activeTshirtIndex = 0;

// AUTO LOAD
document.getElementById("tshirts").addEventListener("change", loadPreview);
document.getElementById("design").addEventListener("change", loadPreview);

// SAVE STATE
function saveState(){
  if(!designObj) return;
  localStorage.setItem("designState", JSON.stringify({
    left: designObj.left,
    top: designObj.top,
    scaleX: designObj.scaleX,
    scaleY: designObj.scaleY
  }));
}

// LOAD STATE
function loadState(img){
  const saved = localStorage.getItem("designState");
  if(!saved) return;

  const s = JSON.parse(saved);
  img.set(s);
}

// LOAD PREVIEW
function loadPreview(){
  tshirtFiles = Array.from(document.getElementById("tshirts").files);
  const designFile = document.getElementById("design").files[0];

  if (!tshirtFiles.length) return;

  setTshirtBackgroundFromIndex();

  // DESIGN LOAD / REPLACE
  if (designFile){
    const dr = new FileReader();
    dr.onload = function(e){
      fabric.Image.fromURL(e.target.result, function(img){

        if (designObj) canvas.remove(designObj);

        loadState(img);

        if(!img.left){
          img.set({ left:150, top:200, scaleX:0.4, scaleY:0.4 });
        }

        designObj = img;
        canvas.add(img);
        canvas.setActiveObject(img);
        canvas.renderAll();

        generate();
      });
    };
    dr.readAsDataURL(designFile);
  }

  renderTshirtList();
}

// SET BACKGROUND BY INDEX
function setTshirtBackgroundFromIndex(){
  const file = tshirtFiles[activeTshirtIndex];
  const reader = new FileReader();
  reader.onload = e => setTshirtBackground(e.target.result);
  reader.readAsDataURL(file);
}

// BACKGROUND
function setTshirtBackground(src){
  fabric.Image.fromURL(src, function(img){
    img.scaleToWidth(400);
    canvas.setBackgroundImage(img, canvas.renderAll.bind(canvas));
  });
}

// RENDER TSHIRT LIST (🔥 main upgrade)
function renderTshirtList(){
  const list = document.getElementById("tshirtList");
  list.innerHTML = "";

  tshirtFiles.forEach((file, i) => {
    const r = new FileReader();

    r.onload = function(e){
      const box = document.createElement("div");

      const img = document.createElement("img");
      img.src = e.target.result;

      // SELECT
      img.onclick = () => {
        activeTshirtIndex = i;
        setTshirtBackground(e.target.result);
        highlightActive();
      };

      // DELETE
      const del = document.createElement("button");
      del.innerText = "❌";
      del.onclick = () => deleteTshirt(i);

      // REPLACE
      const rep = document.createElement("button");
      rep.innerText = "🔁";
      rep.onclick = () => replaceTshirt(i);

      box.appendChild(img);
      box.appendChild(document.createElement("br"));
      box.appendChild(del);
      box.appendChild(rep);

      list.appendChild(box);
      highlightActive();
    };

    r.readAsDataURL(file);
  });
}

// HIGHLIGHT
function highlightActive(){
  const imgs = document.querySelectorAll("#tshirtList img");

  imgs.forEach((img, i) => {
    img.style.border = i === activeTshirtIndex
      ? "3px solid red"
      : "2px solid transparent";
  });
}

// DELETE TSHIRT
function deleteTshirt(index){
  tshirtFiles.splice(index, 1);

  if(activeTshirtIndex >= tshirtFiles.length){
    activeTshirtIndex = 0;
  }

  loadPreview();
  generate();
}

// REPLACE TSHIRT
function replaceTshirt(index){
  const input = document.createElement("input");
  input.type = "file";
  input.accept = "image/*";

  input.onchange = function(e){
    tshirtFiles[index] = e.target.files[0];
    loadPreview();
    generate();
  };

  input.click();
}

// REALTIME
canvas.on('object:moving', () => canvas.renderAll());
canvas.on('object:scaling', () => canvas.renderAll());

canvas.on('object:modified', function(){
  saveState();
  clearTimeout(timeout);
  timeout = setTimeout(generate, 300);
});

// GENERATE (same logic improved)
function generate(){
  if (!tshirtFiles.length) return;

  document.getElementById("output").innerHTML = "";
  generatedImages = [];

  let pos = null, designURL = null;

  if (designObj){
    pos = {
      left: designObj.left,
      top: designObj.top,
      width: designObj.getScaledWidth(),
      height: designObj.getScaledHeight()
    };
    designURL = designObj.toDataURL("image/png");
  }

  let index = 0;

  tshirtFiles.forEach(file => {
    const reader = new FileReader();

    reader.onload = function(ev){
      const tshirtImg = new Image();
      tshirtImg.src = ev.target.result;

      tshirtImg.onload = function(){
        const c = document.createElement("canvas");
        c.width = 400;
        c.height = 500;
        const ctx = c.getContext("2d");

        ctx.drawImage(tshirtImg, 0, 0, 400, 500);

        if (designObj){
          const d = new Image();
          d.src = designURL;

          d.onload = function(){
            ctx.drawImage(d, pos.left, pos.top, pos.width, pos.height);
            saveOutput(c, index++);
          };
        } else {
          saveOutput(c, index++);
        }
      };
    };

    reader.readAsDataURL(file);
  });
}

// SAVE OUTPUT
function saveOutput(c, index){
  const dataURL = c.toDataURL("image/png");
  generatedImages.push(dataURL);

  const box = document.createElement("div");
  box.className = "box";

  const checkbox = document.createElement("input");
  checkbox.type = "checkbox";
  checkbox.value = generatedImages.length - 1;

  const img = document.createElement("img");
  img.src = dataURL;
  img.width = 150;

  const btn = document.createElement("button");
  btn.innerText = "Download";
  btn.onclick = () => downloadImage(dataURL, "mockup_" + index + ".png");

  box.appendChild(checkbox);
  box.appendChild(document.createElement("br"));
  box.appendChild(img);
  box.appendChild(document.createElement("br"));
  box.appendChild(btn);

  document.getElementById("output").appendChild(box);
}

// DELETE DESIGN
function deleteDesign(){
  if(designObj){
    canvas.remove(designObj);
    designObj = null;
    localStorage.removeItem("designState");
    generate();
  }
}

// DOWNLOAD
function downloadImage(data, filename){
  const a = document.createElement("a");
  a.href = data;
  a.download = filename;
  a.click();
}

function downloadSelected(){
  document.querySelectorAll("#output input:checked")
  .forEach((cb,i)=> downloadImage(generatedImages[cb.value], "selected_"+i+".png"));
}

function downloadZIP(){
  const zip = new JSZip();

  document.querySelectorAll("#output input:checked")
  .forEach((cb,i)=>{
    const base64 = generatedImages[cb.value].split(",")[1];
    zip.file("mockup_"+i+".png", base64, {base64:true});
  });

  zip.generateAsync({type:"blob"}).then(content=>{
    const link = document.createElement("a");
    link.href = URL.createObjectURL(content);
    link.download = "mockups.zip";
    link.click();
  });
}
</script>
